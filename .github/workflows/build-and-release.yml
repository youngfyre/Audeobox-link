name: Build and Release VST

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

env:
  GCS_BUCKET: audeobox-cdn
  GCS_PATH: vst/releases
  JUCE_VERSION: "8.0.4"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.platform }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache JUCE
        id: cache-juce
        uses: actions/cache@v4
        with:
          path: JUCE
          key: juce-${{ env.JUCE_VERSION }}-${{ runner.os }}

      - name: Download JUCE
        if: steps.cache-juce.outputs.cache-hit != 'true'
        run: git clone --depth 1 --branch ${{ env.JUCE_VERSION }} https://github.com/juce-framework/JUCE.git JUCE

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Sign macOS binaries
        if: matrix.platform == 'mac'
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          # Import certificate to keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          CERT_PATH=$RUNNER_TEMP/cert.p12
          echo "$CSC_LINK" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$CSC_KEY_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -k "" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain

          ARTIFACTS="build/AudeoboxLink_artefacts/Release"

          # Sign VST3
          codesign --deep --force --options runtime \
            --sign "Developer ID Application" \
            "$ARTIFACTS/VST3/Audeobox Link.vst3"

          # Sign AU
          codesign --deep --force --options runtime \
            --sign "Developer ID Application" \
            "$ARTIFACTS/AU/Audeobox Link.component"

          # Sign Standalone
          codesign --deep --force --options runtime \
            --sign "Developer ID Application" \
            "$ARTIFACTS/Standalone/Audeobox Link.app"

      - name: Get version
        id: version
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Package
        shell: bash
        run: ./scripts/package.sh ${{ matrix.platform }} ${{ steps.version.outputs.version }}

      - name: Notarize macOS
        if: matrix.platform == 'mac'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ZIP="dist/Audeobox-Link-${VERSION}-mac.zip"

          xcrun notarytool submit "$ZIP" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait || echo "Notarization failed (non-fatal for now)"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Upload artifacts to GCS
        shell: bash
        run: |
          cd dist
          for f in *.zip *.yml; do
            [ -f "$f" ] || continue
            echo "Uploading $f..."
            gsutil cp "$f" "gs://${GCS_BUCKET}/${GCS_PATH}/$f"
          done

      - name: Set cache-control on manifests
        shell: bash
        run: |
          cd dist
          for f in *.yml; do
            [ -f "$f" ] || continue
            gsutil setmeta -h "Cache-Control:no-cache, no-store, must-revalidate" "gs://${GCS_BUCKET}/${GCS_PATH}/$f"
          done

      - name: Set cache-control on archives
        shell: bash
        run: |
          cd dist
          for f in *.zip; do
            [ -f "$f" ] || continue
            gsutil setmeta -h "Cache-Control:public, max-age=86400" "gs://${GCS_BUCKET}/${GCS_PATH}/$f"
          done
